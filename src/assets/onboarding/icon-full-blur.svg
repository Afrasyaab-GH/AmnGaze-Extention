<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Full blur icon: fully blurred rectangle -->
  <defs>
    <linearGradient id="fullGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Outer frame -->
  <rect x="8" y="8" width="32" height="32" rx="6" stroke="url(#fullGrad)" stroke-width="2" fill="none"/>
  <!-- Full blur overlay with gradient layers -->
  <rect x="12" y="12" width="24" height="24" rx="4" fill="url(#fullGrad)" opacity="0.3"/>
  <rect x="14" y="14" width="20" height="20" rx="3" fill="url(#fullGrad)" opacity="0.3"/>
  <rect x="16" y="16" width="16" height="16" rx="2" fill="url(#fullGrad)" opacity="0.3"/>
  <rect x="18" y="18" width="12" height="12" rx="1" fill="url(#fullGrad)" opacity="0.4"/>
</svg>
