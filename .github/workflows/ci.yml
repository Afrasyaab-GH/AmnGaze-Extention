name: AmnGaze Extension CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    - name: Build Extension
      run: npm run build

    - name: Create Distribution Package
      run: npm run dist

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: amngaze-extension-zips
        path: dist/*.zip
